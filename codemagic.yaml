workflows:
  capacitor-android-release:
    name: Capacitor Android Release
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      node: 22
      java: 17
    cache:
      cache_paths:
        - ~/.npm
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app (Nuxt static output)
        script: npm run generate

      - name: Ensure Android project exists
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android project
        script: npx cap sync android

      - name: Build Android AAB
        script: |
          cd android
          if [ ! -f "./gradlew" ]; then
            gradle wrapper
          fi
          chmod +x ./gradlew
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/**/*.aab

  capacitor-ios-release:
    name: Capacitor iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 22
      xcode: latest
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - codemagic
        certificates:
          - codemagic
    cache:
      cache_paths:
        - ~/.npm
        - ~/Library/Caches/CocoaPods
        - ~/.cocoapods/repos
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app (Nuxt static output)
        script: npm run generate

      - name: Ensure iOS project exists
        script: |
          if [ ! -d "ios/App" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor iOS project
        script: |
          npx cap sync ios

      - name: Install iOS Pods
        script: |
          if [ -f "ios/App/Podfile" ]; then
            cd ios/App
            pod install
          else
            echo "No Podfile found (likely SPM-only iOS setup). Skipping pod install."
          fi

      - name: Fetch App Store signing files
        script: |
          export APP_STORE_CONNECT_ISSUER_ID="${APP_STORE_CONNECT_ISSUER_ID:-5af92c06-676d-4196-b3f8-13148368e52a}"
          export APP_STORE_CONNECT_KEY_IDENTIFIER="${APP_STORE_CONNECT_KEY_IDENTIFIER:-HF597Z99Y2}"
          if [ -z "${APP_STORE_CONNECT_PRIVATE_KEY:-}" ]; then
            APP_STORE_CONNECT_PRIVATE_KEY="$(printf '%s\n' \
              '-----BEGIN PRIVATE KEY-----' \
              'MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQgDISJa46W9sB/6yxR' \
              'NJZDvDElRiz2GGEtGuvQLylpq/WgCgYIKoZIzj0DAQehRANCAAT4cMnTui/tqv06' \
              'EONVhGaDRpsLg+i6wSpeibTZanRUwLW6hiVNvf08djLQwUEhaXx1GlB3wKeiNF8Y' \
              'Z0hj9W8m' \
              '-----END PRIVATE KEY-----')"
          fi
          app-store-connect fetch-signing-files "com.cvr.app" --type IOS_APP_STORE --create --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" --private-key "$APP_STORE_CONNECT_PRIVATE_KEY"

      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
