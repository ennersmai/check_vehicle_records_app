workflows:
  capacitor-android-release:
    name: Capacitor Android Release
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      node: 22
      java: 17
    cache:
      cache_paths:
        - ~/.npm
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app (Nuxt static output)
        script: npm run generate

      - name: Sync Capacitor Android project
        script: npx cap sync android

      - name: Build Android AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/**/*.aab

  capacitor-ios-release:
    name: Capacitor iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      node: 22
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.cvr.app
    cache:
      cache_paths:
        - ~/.npm
        - ~/Library/Caches/CocoaPods
        - ~/.cocoapods/repos
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app (Nuxt static output)
        script: npm run generate

      - name: Ensure iOS project exists
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor iOS project
        script: npx cap sync ios

      - name: Install iOS Pods
        script: |
          cd ios/App
          pod install

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
