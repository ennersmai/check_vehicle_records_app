workflows:
  capacitor-android-release:
    name: Capacitor Android Release
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      node: 22
      java: 17
    cache:
      cache_paths:
        - ~/.npm
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app (Nuxt static output)
        script: |
          export SUPABASE_URL="${SUPABASE_URL:-${NUXT_PUBLIC_SUPABASE_URL:-}}"
          export SUPABASE_ANON_KEY="${SUPABASE_ANON_KEY:-${NUXT_PUBLIC_SUPABASE_ANON_KEY:-}}"
          export NUXT_PUBLIC_REVENUECAT_API_KEY="${NUXT_PUBLIC_REVENUECAT_API_KEY:-${REVENUECAT_API_KEY:-}}"

          if [ -z "$SUPABASE_URL" ]; then
            echo "Missing SUPABASE_URL (or NUXT_PUBLIC_SUPABASE_URL)"
            exit 1
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_ANON_KEY (or NUXT_PUBLIC_SUPABASE_ANON_KEY)"
            exit 1
          fi

          npm run generate

      - name: Ensure Android project exists
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android project
        script: npx cap sync android

      - name: Build Android AAB
        script: |
          cd android
          if [ ! -f "./gradlew" ]; then
            gradle wrapper
          fi
          chmod +x ./gradlew
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/**/*.aab

  capacitor-ios-release:
    name: Capacitor iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 22
      xcode: latest
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - codemagic
        certificates:
          - codemagic
    cache:
      cache_paths:
        - ~/.npm
        - ~/Library/Caches/CocoaPods
        - ~/.cocoapods/repos
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app (Nuxt static output)
        script: |
          export SUPABASE_URL="${SUPABASE_URL:-${NUXT_PUBLIC_SUPABASE_URL:-}}"
          export SUPABASE_ANON_KEY="${SUPABASE_ANON_KEY:-${NUXT_PUBLIC_SUPABASE_ANON_KEY:-}}"
          export NUXT_PUBLIC_REVENUECAT_API_KEY="${NUXT_PUBLIC_REVENUECAT_API_KEY:-${REVENUECAT_API_KEY:-}}"

          if [ -z "$SUPABASE_URL" ]; then
            echo "Missing SUPABASE_URL (or NUXT_PUBLIC_SUPABASE_URL)"
            exit 1
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_ANON_KEY (or NUXT_PUBLIC_SUPABASE_ANON_KEY)"
            exit 1
          fi

          npm run generate

      - name: Ensure iOS project exists
        script: |
          if [ ! -d "ios/App" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor iOS project
        script: |
          npx cap sync ios

      - name: Set iOS Info.plist privacy keys and unique build number
        script: |
          PLIST_PATH="ios/App/App/Info.plist"
          if [ ! -f "$PLIST_PATH" ]; then
            echo "Missing Info.plist at $PLIST_PATH"
            find ios -name Info.plist || true
            exit 1
          fi

          IOS_BUILD_NUMBER="$(date +%s)"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $IOS_BUILD_NUMBER" "$PLIST_PATH" || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $IOS_BUILD_NUMBER" "$PLIST_PATH"

          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription Scan number plates to auto-fill vehicle registration." "$PLIST_PATH" || \
            /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string Scan number plates to auto-fill vehicle registration." "$PLIST_PATH"

          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription Select a photo to scan a vehicle registration." "$PLIST_PATH" || \
            /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string Select a photo to scan a vehicle registration." "$PLIST_PATH"

          /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryAddUsageDescription Save selected vehicle images when needed." "$PLIST_PATH" || \
            /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string Save selected vehicle images when needed." "$PLIST_PATH"

          echo "Using iOS CFBundleVersion=$IOS_BUILD_NUMBER"

      - name: Install iOS Pods
        script: |
          if [ -f "ios/App/Podfile" ]; then
            cd ios/App
            pod install
          else
            echo "No Podfile found (likely SPM-only iOS setup). Skipping pod install."
          fi

      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
